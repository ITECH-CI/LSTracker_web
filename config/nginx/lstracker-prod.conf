# =====================================================================
# nginx vhost — LSTracker PROD
# Domaine    : lstracker.org (+ www)
# Backend    : 127.0.0.1:9200 (container Docker lst_prod_app)
# Cert       : à compléter avant déploiement (cf. PLACEHOLDERS)
#
# Installation :
#   sudo cp lstracker-prod.conf /etc/nginx/sites-available/lstracker-prod.conf
#   sudo ln -sf /etc/nginx/sites-available/lstracker-prod.conf \
#               /etc/nginx/sites-enabled/lstracker-prod.conf
#   sudo nginx -t && sudo systemctl reload nginx
# =====================================================================

# ---------- HTTP → HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name lstracker.org www.lstracker.org;

    # Permet ACME challenge si un jour tu passes à certbot
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://lstracker.org$request_uri;
    }
}

# ---------- HTTPS principal ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name lstracker.org;

    # PLACEHOLDER ▸ remplacer par les chemins réels des certs lstracker.org
    ssl_certificate     /etc/ssl/lstracker/lstracker.org.fullchain.pem;
    ssl_certificate_key /etc/ssl/lstracker/lstracker.org.key;

    # ---- TLS hardening ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (si supporté par le CA du cert prod)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP volontairement absente : Thymeleaf + JasperReports peuvent générer du
    # inline-script/style. À durcir après audit.

    # ---- Tuning ----
    client_max_body_size 50M;     # uploads de fichiers, exports Jasper
    proxy_read_timeout 120s;      # rapports Jasper peuvent être longs
    proxy_send_timeout 120s;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;

    # ---- Logs ----
    access_log /var/log/nginx/lstracker-prod.access.log;
    error_log  /var/log/nginx/lstracker-prod.error.log warn;

    # ---- Reverse proxy vers le container Docker ----
    location / {
        proxy_pass http://127.0.0.1:9200;
        proxy_http_version 1.1;

        # Headers standards reverse proxy
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket support (au cas où — pas utilisé actuellement)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Buffers raisonnables pour Spring Boot
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # ---- Bloque l'accès direct à /actuator depuis l'extérieur ----
    # Healthcheck reste accessible localement (Docker healthcheck via 9200).
    location /actuator/ {
        # Allowlist : seul l'host peut consulter
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass http://127.0.0.1:9200;
        proxy_set_header Host $host;
    }
}

# ---------- Redirection www → apex ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.lstracker.org;

    # PLACEHOLDER ▸ mêmes certs que ci-dessus (le cert doit inclure www.lstracker.org dans les SAN)
    ssl_certificate     /etc/ssl/lstracker/lstracker.org.fullchain.pem;
    ssl_certificate_key /etc/ssl/lstracker/lstracker.org.key;

    return 301 https://lstracker.org$request_uri;
}
